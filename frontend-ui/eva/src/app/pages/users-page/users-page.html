<div class="flex flex-col items-center gap-10 w-full">

  <div class="w-full">
    <app-user-form></app-user-form>
  </div>


  <div class="p-4 border border-black/50 rounded-2xl shadow-xl w-full">
    <div class="flex w-full justify-between items-center">
      <h3 class="text-3xl">Usuarios</h3>
      <div>
        <mat-form-field appearance="outline" class="w-48">
          <mat-label>Filtrar por rol</mat-label>
          <mat-select [value]="filtroRol()" (selectionChange)="cambiarFiltro($event.value)">
            <mat-option value="TODOS">Todos</mat-option>
            @for (rol of roles(); track rol.idRol) {
              <mat-option [value]="rol.nameRol">{{ rol.nameRol }}</mat-option>
            }
          </mat-select>
        </mat-form-field>
      </div>
    </div>

    <hr >
    <div class="  py-5 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 w-full space-x-2.5">


      @for (user of usersFiltrados(); track user.idUser) {
        <mat-card class="flex flex-col items-center text-center border border-black/50 pt-6 pb-4 relative shadow-2xl">

          <img
            [src]="user.image_url"
            alt="avatar"
            class="w-20 h-20 rounded-full object-cover border-2 border-green-500 mb-3"
          >

          <h3 class="text-base font-semibold">{{ user.name }} {{ user.lastName }}</h3>
          <p class="text-sm text-gray-500">{{ user.mail }}</p>

            <span class="mt-2 text-xs px-2 py-0.5 rounded-full bg-green-50 text-green-700 border border-green-300">
              {{ user.nameRol }}
            </span>

          <mat-card-actions class="flex justify-center gap-1 mt-3">
            @for (action of actions; track action.label) {
              <button mat-icon-button [matTooltip]="action.label" (click)="action.action(user)">
                <mat-icon>{{ action.icon }}</mat-icon>
              </button>
            }
          </mat-card-actions>

        </mat-card>
      }
    </div>

  </div>

</div>
