<div class="chart-container">

    <h2 class="chart-title">
        Recetas por Paciente
    </h2>

    @if(hasData){

        <div class="chart-wrapper chart-bar">
            <canvas #chart></canvas>
        </div>

    } @else {

        <div class="no-data">

            <mat-icon class="no-data-icon">
                bar_chart
            </mat-icon>

            <p class="no-data-message">
                No existen datos
            </p>

        </div>

    }

</div>
