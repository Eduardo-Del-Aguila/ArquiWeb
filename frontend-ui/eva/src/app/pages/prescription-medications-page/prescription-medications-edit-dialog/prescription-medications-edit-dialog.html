<div class="p-4 w-full">

  <h2 class="text-lg font-semibold mb-4">
    Editar Relación
  </h2>

  <form
    [formGroup]="form"
    (ngSubmit)="guardar()"
    class="flex flex-col gap-4">

    <mat-form-field appearance="outline">

      <mat-label>ID Prescripción</mat-label>

      <input
        matInput
        type="number"
        formControlName="idPrescription">

    </mat-form-field>

    <mat-form-field appearance="outline">

      <mat-label>ID Medicamento</mat-label>

      <input
        matInput
        type="number"
        formControlName="idMedication">

    </mat-form-field>

    <mat-form-field appearance="outline">

      <mat-label>Dosis</mat-label>

      <input
        matInput
        type="number"
        formControlName="dose">

    </mat-form-field>

    <mat-form-field appearance="outline">

      <mat-label>Frecuencia</mat-label>

      <input
        matInput
        type="number"
        formControlName="frequency">

    </mat-form-field>

    <mat-form-field appearance="outline">

      <mat-label>Duración</mat-label>

      <input
        matInput
        type="number"
        formControlName="duration">

    </mat-form-field>

    <div class="flex justify-end gap-2">

      <button
        mat-button
        type="button"
        (click)="cancelar()">

        Cancelar

      </button>

      <button
        mat-raised-button
        color="primary"
        type="submit"
        [disabled]="form.invalid">

        Actualizar

      </button>

    </div>

  </form>

</div>
