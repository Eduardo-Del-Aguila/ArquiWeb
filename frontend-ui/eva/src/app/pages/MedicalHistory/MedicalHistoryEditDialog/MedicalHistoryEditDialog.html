<div class="p-4 w-full">
  <h2 class="text-lg font-semibold mb-4">Editar Historial Médico</h2>

  <form [formGroup]="form" (ngSubmit)="guardar()" class="flex flex-col gap-4">

    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Motivo</mat-label>
      <textarea matInput formControlName="reason" rows="2"></textarea>
      @if (form.get('reason')?.hasError('required') && form.get('reason')?.touched) {
        <mat-error>El motivo es requerido</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Tratamiento</mat-label>
      <textarea matInput formControlName="treatment" rows="2"></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Observaciones</mat-label>
      <textarea matInput formControlName="observations" rows="2"></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Diagnóstico</mat-label>
      <textarea matInput formControlName="diagnostics" rows="2"></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Estado</mat-label>
      <mat-select formControlName="status">
        @for (s of statuses; track s) {
          <mat-option [value]="s">{{ s }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <div class="flex justify-end gap-2">
      <button mat-button type="button" (click)="cancelar()">Cancelar</button>
      <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
        Actualizar
      </button>
    </div>

  </form>
</div>
