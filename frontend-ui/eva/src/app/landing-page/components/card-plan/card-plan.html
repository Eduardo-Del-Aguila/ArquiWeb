<div class="w-full min-h-screen flex flex-col justify-center items-center">
  <div class=" w-full h-full flex flex-col justify-center items-center ">
    <h2>Selecciona el mejor plan </h2>
    <P></P>
  </div>

  <div class="flex gap-15">
    <div class="relative hover:border hover:border-cyan-500 bg-white p-5 rounded-xl flex flex-col gap-8">
      <div class="absolute -top-3 right-0 bg-[#00BCD4] px-3 py-1 rounded-2xl text-white ">Most popular</div>
      <div>
        <h3>Comfort</h3>
        <p class="text-3xl"> 59  <span class="text-xs">/mo</span></p>
      </div>
      <div>
        <ul class="flex flex-col gap-3">
          @for (item of list; track $index) {
          <li class="flex w-full gap-3 text-xs">
            <span class="flex justify-center items-center border rounded-full p-0.5">
              <svg  xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
                <path d="M0 0h24v24H0z" fill="none" />
                <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m5 12l5 5L20 7" />
              </svg>
            </span>
            Access to All Pet Personalities {{ item }} </li>
          }

        </ul>
      </div>
      <button class="flex text-ms w-full justify-center py-4 border-0.5 bg-[#00BCD4] rounded-xl font-bold">
        Select Comfort
      </button>
    </div>

  </div>
</div>
