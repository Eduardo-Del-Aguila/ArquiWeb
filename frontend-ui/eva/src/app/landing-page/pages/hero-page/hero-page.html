<section id="inicio" class="bg-[#F4F7FD]">

  <div
    class="max-w-7xl mx-auto min-h-[calc(100vh-80px)] px-6 py-20 flex flex-col-reverse lg:flex-row items-center justify-between gap-16">
    <div class="flex-1 text-center lg:text-left">
      <h1 class="text-5xl lg:text-6xl font-bold text-[#0A2F7D] leading-tight">
        Tu nuevo mejor amigo
        <br>
        es virtual
      </h1>

      <p class="mt-8 text-lg text-gray-600 leading-8 max-w-xl">
        EvaPet es un asistente emocional inteligente diseñado para brindar
        compañía, conversación y apoyo a adultos mayores. Escucha,
        recuerda momentos importantes y está presente cuando más lo necesitan.
      </p>

      <div
        class="mt-10 flex flex-col sm:flex-row gap-5 justify-center lg:justify-start">

        <button
        [routerLink]="['/login']"
          class="bg-[#0A2F7D] hover:bg-[#08265f] text-white font-semibold px-8 py-4 rounded-xl transition">
          Iniciar sesión
        </button>
        <button
          class="border-2 border-[#0A2F7D] text-[#0A2F7D] hover:bg-[#0A2F7D] hover:text-white font-semibold px-8 py-4 rounded-xl transition">
          Conocer más
        </button>
      </div>

    </div>
    <div class="flex-1 flex justify-center">
      <img
        src="./assets/img/hero.jpg"
        alt="Persona usando EvaPet"
        class="w-full max-w-lg rounded-4xl shadow-2xl object-cover">
    </div>

  </div>

</section>
